# ============================================================
#  lin-sniffer  –  ESPHome
#  Minimal LIN bus sniffer with the lin_bus component
# ============================================================

esphome:
  name: lin-sniffer
  friendly_name: LIN Sniffer

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://Chance-Konstruktion/esphome-wire-whisperer@main
    components: [lin_bus]

uart:
  - id: lin_uart
    tx_pin: GPIO4
    rx_pin: GPIO5
    baud_rate: 19200

lin_bus:
  id: lin_sniffer
  uart_id: lin_uart
  frame_timeout: 20ms
  mappings:
    - lin_id: 0x12
      name: "Außentemperatur LIN"
      unit_of_measurement: "°C"
      device_class: temperature
      scale: 0.1
      offset: -40.0
      data_length: 2
      signed: true
    - lin_id: 0x2A
      name: "Sitzheizung Fahrer"
      unit_of_measurement: "Stufe"
      data_length: 1
